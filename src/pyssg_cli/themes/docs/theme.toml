[theme]
name        = "docs"
description = "Documentation theme: folder sidebar, prev/next, clean typography."
version     = "1.0.0"
requires_pyssg = ">=0.1"
author      = "pyssg"
homepage    = "https://github.com/your-org/pyssg"

[config]
preset = "docs"
src    = "content"
out    = "public"

[config.options]
markdown_extensions = ["fenced_code", "tables", "toc"]
template_dir        = "layouts"
sitemap             = true
minify              = false
highlight           = true

[dependencies]
plugins = []

[scaffold]
include = ["layouts", "assets", "content"]
sample  = ["content"]
