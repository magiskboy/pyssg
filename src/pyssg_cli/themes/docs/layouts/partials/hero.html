<section class="hero">
  {% if page.hero_eyebrow %}<span class="hero-eyebrow">{{ page.hero_eyebrow }}</span>{% endif %}
  <h1 class="hero-title">{{ site.title }}</h1>
  {% if site.tagline %}<p class="hero-tagline">{{ site.tagline }}</p>{% endif %}
  <div class="hero-actions">
    <a class="btn btn-primary" href="/guide/getting-started/">Get started &rarr;</a>
    {% if site.repo_url %}<a class="btn btn-ghost" href="{{ site.repo_url }}">View on GitHub</a>{% endif %}
  </div>
</section>
