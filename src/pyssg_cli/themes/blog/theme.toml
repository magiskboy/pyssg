[theme]
name        = "blog"
description = "Personal blog: paginated index, tags, RSS, dark mode."
version     = "1.0.0"
requires_pyssg = ">=0.1"
author      = "pyssg"
homepage    = "https://github.com/your-org/pyssg"

[config]
preset = "blog"
src    = "content"
out    = "public"

[config.options]
page_size           = 10
markdown_extensions = ["fenced_code", "tables", "toc"]
template_dir        = "layouts"
rss                 = true
sitemap             = true
minify              = false

[dependencies]
plugins = []

[scaffold]
include = ["layouts", "assets", "content"]
sample  = ["content"]
