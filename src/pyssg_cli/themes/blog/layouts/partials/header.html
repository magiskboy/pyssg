<header class="topbar">
  <a class="brand" href="/">{{ site.title }}</a>
  <nav class="topnav">
    <a class="nav-link{% if current_url == '/' %} active{% endif %}" href="/">Home</a>
    <a class="nav-link{% if current_url == '/blog/' %} active{% endif %}" href="/blog/">Blog</a>
    {% for node in menus.main %}
      <a class="nav-link{% if node.url == current_url %} active{% endif %}" href="{{ node.url }}">{{ node.title }}</a>
    {% endfor %}
  </nav>
</header>
