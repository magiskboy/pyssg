<svg width="96" height="96" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pyssg">
  <defs>
    <linearGradient id="pyssg-icon-bg" x1="4" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#6D45D8"/>
      <stop offset="1" stop-color="#8B3DE0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#pyssg-icon-bg)"/>

  <g stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- stem of p with descender -->
    <path d="M17.5 13.5 V38.5"/>
    <!-- bowl of p -->
    <circle cx="24.8" cy="21" r="7.3"/>
    <!-- backlink edge to an external knowledge node -->
    <path d="M32.1 21 L37 31.5" stroke-width="1.9" opacity="0.85"/>
  </g>

  <!-- graph nodes -->
  <g fill="#FFFFFF">
    <circle cx="17.5" cy="13.5" r="3.3"/>
    <circle cx="32.1" cy="21" r="3.3"/>
    <circle cx="17.5" cy="38.5" r="3.1"/>
    <circle cx="37" cy="31.5" r="3.1"/>
  </g>
  <!-- node cores (ports) -->
  <g fill="url(#pyssg-icon-bg)">
    <circle cx="17.5" cy="13.5" r="1.35"/>
    <circle cx="32.1" cy="21" r="1.35"/>
    <circle cx="37" cy="31.5" r="1.25"/>
  </g>
</svg>
