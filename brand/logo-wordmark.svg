<svg width="232" height="56" viewBox="0 0 232 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pyssg">
  <defs>
    <linearGradient id="pyssg-wm" x1="16" y1="14" x2="44" y2="44" gradientUnits="userSpaceOnUse">
