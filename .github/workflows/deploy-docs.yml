# Build the documentation site and deploy it to Cloudflare Workers with Wrangler.
#
# This replaces Cloudflare's dashboard git auto-build: GitHub Actions builds the
# site and `wrangler deploy` pushes ./docs/public to the "pyssg" Worker
# (configured in docs/wrangler.jsonc).
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   token with the "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  the account that owns the Worker
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --all-extras
      - name: Build site
        run: uv run pyssg build
        working-directory: docs
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          # v4 is required to deploy a static-assets-only Worker (no `main`);
          # the action otherwise installs an older default that errors with
          # "Missing entry-point".
          wranglerVersion: "4.40.0"
          command: deploy
