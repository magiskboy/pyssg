name: Release

# pyssg is not published to PyPI; releases are git tags with the built wheel and
# sdist attached so users can pin or download a specific version. Cut a release
# by pushing a tag: `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Build wheel and sdist
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
