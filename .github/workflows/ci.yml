name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --all-extras
      - name: mypy
        run: uv run mypy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      # --all-extras pulls watchdog so the DevServer event-based path is exercised.
      - run: uv sync --all-extras
      - name: unittest
        run: uv run python -m unittest discover -s tests -v

  package:
    name: Build and smoke test (git-install channel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      # Verify the primary distribution channel: build the artifacts, install the
      # wheel into a clean environment, then scaffold and build a site offline.
      - name: Build wheel and sdist
        run: uv build
      - name: Smoke test the built wheel
        run: |
          wheel=$(ls dist/*.whl)
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke "pyssg[plugins] @ ${wheel}"
          /tmp/smoke/bin/pyssg new site --theme docs
          (cd site && /tmp/smoke/bin/pyssg build)
          test -f site/public/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
