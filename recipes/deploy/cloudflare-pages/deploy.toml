# Deploy recipe manifest -- static data only (parsed with tomllib).

[target]
name        = "cloudflare-pages"
title       = "Cloudflare Pages"
homepage    = "https://developers.cloudflare.com/pages"
publish_dir = "public"            # must equal Config.out

# pyssg emits root-absolute links, so serve from the domain root (the
# *.pages.dev subdomain or a custom domain both qualify).
root_served_only = true

# Cloudflare Pages is normally configured in the dashboard (build command +
# output directory), so the only project file is an optional GitHub Actions
# workflow for those who prefer CI-driven deploys with Wrangler.
[[project_files]]
path   = ".github/workflows/deploy.yml"
source = "deploy.yml"
