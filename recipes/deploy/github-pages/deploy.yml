# Build the site with pyssg and publish it to GitHub Pages.
#
# Setup once: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".
#
# Limitation: serve from the domain root. Use a user/org site
# (<user>.github.io) or a custom domain (add a CNAME file to public/). Project
# sites at user.github.io/<repo>/ need base_url, which pyssg does not have yet.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Adjust the extras to match your project's plugin dependencies. The
      # `--with` form needs no pyproject.toml; if you have one, use `uv sync`
      # followed by `uv run pyssg build` instead.
      - name: Build site
        run: uv run --python 3.13 --with "pyssg[plugins]" pyssg build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
