# Deploy recipe manifest -- static data only (parsed with tomllib).
#
# This file is the single source of truth for the GitHub Pages recipe. Today it
# documents which files to copy by hand; a future DeployPlugin / `pyssg deploy
# init` reads the same manifest to emit and scaffold them automatically.

[target]
name        = "github-pages"
title       = "GitHub Pages"
homepage    = "https://docs.github.com/en/pages"
publish_dir = "public"            # must equal Config.out

# pyssg emits root-absolute links, so a site must be served from the domain
# root. Project sites (user.github.io/<repo>/) serve from a subpath and are not
# supported until base_url lands -- use a user/org site or a custom domain.
root_served_only = true

# Written once into the project (copy, or a future `pyssg deploy init`).
[[project_files]]
path   = ".github/workflows/deploy.yml"
source = "deploy.yml"

# Emitted into the build output on every build. A future DeployPlugin taps the
# `generate` hook and writes each entry as an Output; content is inline here.
[[output_files]]
path    = ".nojekyll"
content = ""
